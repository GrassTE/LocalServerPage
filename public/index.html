<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>内网主页</title>
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <canvas id="networkCanvas" aria-hidden="true"></canvas>
    <div class="backdrop" aria-hidden="true"></div>
    <main class="shell">
      <section class="topbar" aria-label="主页概览">
        <div>
          <p class="eyebrow">LAN Home</p>
          <h1>内网主页</h1>
        </div>
        <div class="summary" aria-live="polite">
          <span id="modeLabel">在线服务</span>
          <span id="onlineCount">在线服务 --</span>
        </div>
      </section>

      <section class="toolbar" aria-label="筛选工具">
        <div class="search">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="m21 21-4.35-4.35M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Z"></path>
          </svg>
          <input id="searchInput" type="search" placeholder="搜索站点" autocomplete="off">
        </div>
        <button id="refreshButton" type="button" title="刷新状态">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M21 12a9 9 0 0 1-15.3 6.36M3 12A9 9 0 0 1 18.3 5.64M21 5v6h-6M3 19v-6h6"></path>
          </svg>
        </button>
      </section>

      <section id="siteGrid" class="grid" aria-live="polite"></section>
      <p id="emptyState" class="empty" hidden>没有匹配的站点</p>
    </main>

    <template id="siteTemplate">
      <a class="site-card" target="_blank" rel="noreferrer">
        <span class="status-dot" aria-hidden="true"></span>
        <span class="icon-wrap">
          <img alt="" loading="lazy">
          <span class="fallback-icon" aria-hidden="true"></span>
        </span>
        <span class="site-main">
          <strong></strong>
          <small class="description"></small>
        </span>
        <span class="meta">
          <span class="state">检测中</span>
          <span class="latency"></span>
        </span>
      </a>
    </template>

    <script src="/app.js" type="module"></script>
  </body>
</html>
